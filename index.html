<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manipulation Normalparabel</title>

<style>
:root {
  --color-a: #7c3aed;
  --color-d: #ea580c;
  --color-e: #0891b2;
  --color-active: #2563eb;
  --color-border: #d8e1ea;
  --color-text: #111;
  --color-muted: #475569;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #f7fbff 0%, #ffffff 100%);
  color: var(--color-text);
}

.container {
  padding: 14px;
  max-width: 950px;
  margin: 0 auto;
}

.hero-title {
  margin-bottom: 14px;
  padding: 14px 16px;
  border-radius: 18px;
  background: linear-gradient(135deg, #0f4c81 0%, #2563eb 55%, #60a5fa 100%);
  color: white;
  box-shadow: 0 10px 24px rgba(37, 99, 235, 0.18);
}

.hero-title h1 {
  margin: 0;
  font-size: 28px;
  line-height: 1.1;
  letter-spacing: 0.2px;
}

.mode-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  margin-bottom: 14px;
}

.mode-list button,
.nav-buttons button {
  border: none;
  border-radius: 14px;
  padding: 12px 10px;
  font-size: 16px;
  font-weight: 700;
  background: #e8f0ff;
  color: #1847a8;
  cursor: pointer;
  transition: transform 0.12s ease, background 0.12s ease, opacity 0.12s ease;
}

.mode-list button:hover,
.nav-buttons button:hover {
  transform: translateY(-1px);
}

.mode-list button.active {
  background: var(--color-active);
  color: white;
  box-shadow: 0 6px 16px rgba(37, 99, 235, 0.22);
}

.graph-wrap {
  margin-bottom: 14px;
}

svg {
  width: 100%;
  height: 420px;
  border: 1px solid var(--color-border);
  background: #fafcff;
  display: block;
  border-radius: 16px;
}

.form-panel {
  padding: 12px 14px;
  border: 1px solid var(--color-border);
  border-radius: 16px;
  background: white;
  box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
}

.formula-display {
  font-size: 24px;
  font-weight: bold;
  line-height: 1.6;
  margin-bottom: 14px;
  color: #1847a8;
}

.slider-panel {
  display: grid;
  gap: 16px;
}

.slider-group {
  display: grid;
  gap: 6px;
}

.slider-group.hidden {
  display: none;
}

.slider-group label {
  font-size: 16px;
  font-weight: 700;
}

.slider-group.a-group label {
  color: var(--color-a);
}

.slider-group.d-group label {
  color: var(--color-d);
}

.slider-group.e-group label {
  color: var(--color-e);
}

.range-wrap {
  position: relative;
  padding-top: 28px;
}

.value-badge {
  position: absolute;
  top: 0;
  transform: translateX(-50%);
  min-width: 34px;
  text-align: center;
  padding: 2px 8px;
  border-radius: 999px;
  color: white;
  font-size: 13px;
  font-weight: 700;
  box-shadow: 0 4px 10px rgba(15, 23, 42, 0.16);
  pointer-events: none;
  white-space: nowrap;
}

.value-badge.a-badge {
  background: var(--color-a);
}

.value-badge.d-badge {
  background: var(--color-d);
}

.value-badge.e-badge {
  background: var(--color-e);
}

input[type="range"] {
  width: 100%;
  margin: 0;
  accent-color: var(--color-active);
}

#a {
  accent-color: var(--color-a);
}

#d {
  accent-color: var(--color-d);
}

#e {
  accent-color: var(--color-e);
}

.nav-buttons {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  margin-top: 16px;
}

.nav-buttons button {
  flex: 1;
}

.nav-buttons button:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  transform: none;
}

@media (max-width: 700px) {
  svg {
    height: 380px;
  }

  .hero-title h1 {
    font-size: 23px;
  }

  .formula-display {
    font-size: 20px;
  }
}

@media (max-width: 480px) {
  svg {
    height: 360px;
  }

  .hero-title {
    padding: 12px 14px;
  }

  .hero-title h1 {
    font-size: 20px;
  }

  .formula-display {
    font-size: 17px;
  }

  .mode-list button,
  .nav-buttons button {
    font-size: 14px;
    padding: 11px 8px;
  }
}
</style>
</head>

<body>
<div class="container">
  <div class="hero-title">
    <h1>Manipulation Normalparabel</h1>
  </div>

  <div class="mode-list">
    <button id="btnVertical" onclick="setMode('vertical')">Verschiebung in y-Richtung</button>
    <button id="btnHorizontal" onclick="setMode('horizontal')">Verschiebung in x-Richtung</button>
    <button id="btnOpen" onclick="setMode('open')">Streckung / Stauchung</button>
    <button id="btnAll" onclick="setMode('all')">Alle Parameter</button>
  </div>

  <div class="graph-wrap">
    <svg id="svg"></svg>
  </div>

  <div class="form-panel">
    <div class="formula-display" id="formulaDisplay"></div>

    <div class="slider-panel">
      <div class="slider-group a-group" id="groupA">
        <label for="a">a</label>
        <div class="range-wrap">
          <div class="value-badge a-badge" id="aBadge"></div>
          <input type="range" id="a" min="-5" max="5" step="1">
        </div>
      </div>

      <div class="slider-group d-group" id="groupD">
        <label for="d">d</label>
        <div class="range-wrap">
          <div class="value-badge d-badge" id="dBadge"></div>
          <input type="range" id="d" min="-5" max="5" step="1">
        </div>
      </div>

      <div class="slider-group e-group" id="groupE">
        <label for="e">e</label>
        <div class="range-wrap">
          <div class="value-badge e-badge" id="eBadge"></div>
          <input type="range" id="e" min="-5" max="5" step="1">
        </div>
      </div>
    </div>

    <div class="nav-buttons">
      <button id="btnPrev" onclick="goPrev()">Zurück</button>
      <button id="btnNext" onclick="goNext()">Weiter</button>
    </div>
  </div>
</div>

<script>
const svg = document.getElementById("svg");
const aSlider = document.getElementById("a");
const dSlider = document.getElementById("d");
const eSlider = document.getElementById("e");

const aBadge = document.getElementById("aBadge");
const dBadge = document.getElementById("dBadge");
const eBadge = document.getElementById("eBadge");
const formulaDisplay = document.getElementById("formulaDisplay");

const groupA = document.getElementById("groupA");
const groupD = document.getElementById("groupD");
const groupE = document.getElementById("groupE");

const btnVertical = document.getElementById("btnVertical");
const btnHorizontal = document.getElementById("btnHorizontal");
const btnOpen = document.getElementById("btnOpen");
const btnAll = document.getElementById("btnAll");

const btnPrev = document.getElementById("btnPrev");
const btnNext = document.getElementById("btnNext");

const modeOrder = ["vertical", "horizontal", "open", "all"];
const modeButtons = {
  vertical: btnVertical,
  horizontal: btnHorizontal,
  open: btnOpen,
  all: btnAll
};

const xMin = -10, xMax = 10, yMin = -10, yMax = 10;
let currentMode = "vertical";

function toX(x, w) {
  return (x - xMin) / (xMax - xMin) * w;
}

function toY(y, h) {
  return h - (y - yMin) / (yMax - yMin) * h;
}

function formatSigned(n) {
  return n >= 0 ? `+ ${n}` : `- ${Math.abs(n)}`;
}

function formatInner(d) {
  return d >= 0 ? `(x - ${d})²` : `(x + ${Math.abs(d)})²`;
}

function formatA(a) {
  if (a === 1) return "";
  if (a === -1) return "-";
  return `${a}`;
}

function updateBadge(slider, badge, value) {
  const min = Number(slider.min);
  const max = Number(slider.max);
  const percent = ((value - min) / (max - min)) * 100;
  badge.textContent = value;
  badge.style.left = `calc(${percent}% + (${10 - percent * 0.2}px))`;
}

function updateFormula(a, d, e) {
  if (currentMode === "vertical") {
    formulaDisplay.textContent = `f(x) = x² ${formatSigned(e)}`;
  }

  if (currentMode === "horizontal") {
    formulaDisplay.textContent = `f(x) = ${formatInner(d)}`;
  }

  if (currentMode === "open") {
    formulaDisplay.textContent = `f(x) = ${formatA(a)}x²`;
  }

  if (currentMode === "all") {
    formulaDisplay.textContent = `f(x) = ${formatA(a)}${formatInner(d)} ${formatSigned(e)}`;
  }
}

function setActiveButton(mode) {
  Object.entries(modeButtons).forEach(([key, btn]) => {
    btn.classList.toggle("active", key === mode);
  });
}

function updateNavButtons() {
  const index = modeOrder.indexOf(currentMode);
  btnPrev.disabled = index === 0;
  btnNext.disabled = index === modeOrder.length - 1;
}

function setMode(mode) {
  currentMode = mode;

  if (mode === "vertical") {
    groupA.classList.add("hidden");
    groupD.classList.add("hidden");
    groupE.classList.remove("hidden");
    aSlider.value = 1;
    dSlider.value = 0;
  }

  if (mode === "horizontal") {
    groupA.classList.add("hidden");
    groupD.classList.remove("hidden");
    groupE.classList.add("hidden");
    aSlider.value = 1;
    eSlider.value = 0;
  }

  if (mode === "open") {
    groupA.classList.remove("hidden");
    groupD.classList.add("hidden");
    groupE.classList.add("hidden");
    dSlider.value = 0;
    eSlider.value = 0;
    if (parseInt(aSlider.value, 10) === 0) {
      aSlider.value = 1;
    }
  }

  if (mode === "all") {
    groupA.classList.remove("hidden");
    groupD.classList.remove("hidden");
    groupE.classList.remove("hidden");
  }

  setActiveButton(mode);
  updateNavButtons();
  draw();
}

function goPrev() {
  const index = modeOrder.indexOf(currentMode);
  if (index > 0) {
    setMode(modeOrder[index - 1]);
  }
}

function goNext() {
  const index = modeOrder.indexOf(currentMode);
  if (index < modeOrder.length - 1) {
    setMode(modeOrder[index + 1]);
  }
}

function draw() {
  const a = parseInt(aSlider.value, 10);
  const d = parseInt(dSlider.value, 10);
  const e = parseInt(eSlider.value, 10);

  updateBadge(aSlider, aBadge, a);
  updateBadge(dSlider, dBadge, d);
  updateBadge(eSlider, eBadge, e);
  updateFormula(a, d, e);

  const w = svg.clientWidth;
  const h = svg.clientHeight;

  svg.innerHTML = "";

  for (let x = Math.ceil(xMin); x <= xMax; x++) {
    const px = toX(x, w);
    svg.innerHTML += `<line x1="${px}" y1="0" x2="${px}" y2="${h}" stroke="#dde4ec" stroke-width="1"/>`;
  }

  for (let y = Math.ceil(yMin); y <= yMax; y++) {
    const py = toY(y, h);
    svg.innerHTML += `<line x1="0" y1="${py}" x2="${w}" y2="${py}" stroke="#dde4ec" stroke-width="1"/>`;
  }

  svg.innerHTML += `<line x1="0" y1="${toY(0, h)}" x2="${w}" y2="${toY(0, h)}" stroke="black" stroke-width="2"/>`;
  svg.innerHTML += `<line x1="${toX(0, w)}" y1="0" x2="${toX(0, w)}" y2="${h}" stroke="black" stroke-width="2"/>`;

  const nx = -2.2;
  const ny = nx * nx;
  svg.innerHTML += `<text x="${toX(nx, w)}" y="${toY(ny, h) - 10}" fill="black" font-size="18" font-weight="bold">x²</text>`;

  let p1 = "";
  for (let i = 0; i <= 900; i++) {
    const x = xMin + i * (xMax - xMin) / 900;
    const y = x * x;
    p1 += `${toX(x, w)},${toY(y, h)} `;
  }
  svg.innerHTML += `<polyline points="${p1}" fill="none" stroke="black" stroke-width="4"/>`;

  let p2 = "";
  for (let i = 0; i <= 900; i++) {
    const x = xMin + i * (xMax - xMin) / 900;
    const y = a * Math.pow(x - d, 2) + e;
    p2 += `${toX(x, w)},${toY(y, h)} `;
  }
  svg.innerHTML += `<polyline points="${p2}" fill="none" stroke="#2563eb" stroke-width="4"/>`;

  const px = toX(d, w);
  const py = toY(e, h);
  svg.innerHTML += `<circle cx="${px}" cy="${py}" r="6" fill="red"/>`;
}

aSlider.value = 1;
dSlider.value = 0;
eSlider.value = 0;

[aSlider, dSlider, eSlider].forEach(el => {
  el.addEventListener("input", draw);
});

setMode("vertical");
window.addEventListener("resize", draw);
</script>
</body>
</html>
