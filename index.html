<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parabel Vergleich</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: white;
}

.container {
  padding: 10px;
  max-width: 900px;
  margin: 0 auto;
}

.graph-wrap {
  margin-bottom: 18px;
}

svg {
  width: 100%;
  height: 420px;
  border: 1px solid #ddd;
  background: #fafafa;
}

.form-panel {
  margin-top: 10px;
  padding: 14px;
  border: 1px solid #ddd;
  border-radius: 14px;
  background: #f8f8f8;
}

.form-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 12px;
}

.vertex-form {
  font-size: 28px;
  font-weight: bold;
  line-height: 1.6;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
}

select {
  font-size: 22px;
  padding: 6px 10px;
  border-radius: 10px;
  border: 1px solid #bbb;
  background: white;
}

.info {
  margin-top: 14px;
  font-size: 18px;
  color: #333;
}

@media (max-width: 600px) {
  .vertex-form {
    font-size: 22px;
  }

  select {
    font-size: 18px;
  }

  svg {
    height: 360px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="graph-wrap">
    <svg id="svg"></svg>
  </div>

  <div class="form-panel">
    <div class="form-title">Scheitelpunktform</div>

    <div class="vertex-form">
      <span>g(x) =</span>

      <select id="a"></select>

      <span>(x -</span>

      <select id="d"></select>

      <span>)² +</span>

      <select id="e"></select>
    </div>

    <div class="info" id="infoText">
      Normalparabel: f(x) = x²
    </div>
  </div>

</div>

<script>
const svg = document.getElementById("svg");
const infoText = document.getElementById("infoText");
const aSelect = document.getElementById("a");
const dSelect = document.getElementById("d");
const eSelect = document.getElementById("e");

const xMin = -10, xMax = 10, yMin = -10, yMax = 10;

function toX(x, w) {
  return (x - xMin) / (xMax - xMin) * w;
}

function toY(y, h) {
  return h - (y - yMin) / (yMax - yMin) * h;
}

function snum(n) {
  return Number(n).toString();
}

function populateSelect(select, start, end, skipZero = false) {
  select.innerHTML = "";
  for (let i = start; i <= end; i++) {
    if (skipZero && i === 0) continue;
    const option = document.createElement("option");
    option.value = i;
    option.textContent = i;
    select.appendChild(option);
  }
}

function draw() {
  const a = parseInt(aSelect.value, 10);
  const d = parseInt(dSelect.value, 10);
  const e = parseInt(eSelect.value, 10);

  const w = svg.clientWidth;
  const h = svg.clientHeight;

  svg.innerHTML = "";

  // Raster
  for (let x = Math.ceil(xMin); x <= xMax; x++) {
    const px = toX(x, w);
    svg.innerHTML += `<line x1="${px}" y1="0" x2="${px}" y2="${h}" stroke="#ddd" stroke-width="1"/>`;
  }

  for (let y = Math.ceil(yMin); y <= yMax; y++) {
    const py = toY(y, h);
    svg.innerHTML += `<line x1="0" y1="${py}" x2="${w}" y2="${py}" stroke="#ddd" stroke-width="1"/>`;
  }

  // Achsen
  svg.innerHTML += `<line x1="0" y1="${toY(0, h)}" x2="${w}" y2="${toY(0, h)}" stroke="black" stroke-width="2"/>`;
  svg.innerHTML += `<line x1="${toX(0, w)}" y1="0" x2="${toX(0, w)}" y2="${h}" stroke="black" stroke-width="2"/>`;

  // Normalparabel
  let p1 = "";
  for (let i = 0; i <= 900; i++) {
    const x = xMin + i * (xMax - xMin) / 900;
    const y = x * x;
    p1 += `${toX(x, w)},${toY(y, h)} `;
  }
  svg.innerHTML += `<polyline points="${p1}" fill="none" stroke="black" stroke-width="4"/>`;

  // Vergleichsparabel
  let p2 = "";
  for (let i = 0; i <= 900; i++) {
    const x = xMin + i * (xMax - xMin) / 900;
    const y = a * Math.pow(x - d, 2) + e;
    p2 += `${toX(x, w)},${toY(y, h)} `;
  }
  svg.innerHTML += `<polyline points="${p2}" fill="none" stroke="blue" stroke-width="4"/>`;

  // Scheitelpunkt + Beschriftung
  const px = toX(d, w);
  const py = toY(e, h);
  const label = `S(${snum(d)} | ${snum(e)})`;

  svg.innerHTML += `<circle cx="${px}" cy="${py}" r="6" fill="red"/>`;
  svg.innerHTML += `<line x1="${px}" y1="${py}" x2="${px + 18}" y2="${py - 18}" stroke="red" stroke-width="2"/>`;
  svg.innerHTML += `<text x="${px + 22}" y="${py - 22}" fill="red" font-size="18" font-weight="bold">${label}</text>`;

  infoText.textContent = `Normalparabel: f(x) = x²   |   Scheitelpunkt der blauen Parabel: S(${d} | ${e})`;
}

populateSelect(aSelect, -5, 5, true);
populateSelect(dSelect, -5, 5, false);
populateSelect(eSelect, -5, 5, false);

aSelect.value = 1;
dSelect.value = 0;
eSelect.value = 0;

[aSelect, dSelect, eSelect].forEach(el => el.addEventListener("change", draw));

draw();
</script>

</body>
</html>
