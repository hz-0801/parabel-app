<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manipulation Normalparabel</title>

  <style>
    :root {
      --color-a: #7c3aed;
      --color-d: #ea580c;
      --color-e: #0891b2;
      --color-curve: #2563eb;
      --color-border: #d8e1ea;
      --color-text: #111;
      --panel-bg: rgba(255, 255, 255, 0.92);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f7fbff 0%, #ffffff 100%);
      color: var(--color-text);
    }

    .container {
      padding: 14px;
      max-width: 980px;
      margin: 0 auto;
    }

    .hero-title {
      margin-bottom: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, #0f4c81 0%, #2563eb 55%, #60a5fa 100%);
      color: white;
    }

    .hero-title h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
    }

    .mode-title {
      margin: 0 0 14px 0;
      padding: 12px 14px;
      border-radius: 14px;
      background: white;
      border: 1px solid var(--color-border);
      font-size: 22px;
      font-weight: 700;
      color: #1847a8;
    }

    .graph-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    svg {
      width: 100%;
      height: 520px;
      border: 1px solid var(--color-border);
      background: #fafcff;
      display: block;
      border-radius: 16px;
    }

    .controls-overlay {
      position: absolute;
      right: 18px;
      bottom: 18px;
      width: min(360px, calc(50% - 24px));
      padding: 14px;
      border-radius: 16px;
      background: var(--panel-bg);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(216, 225, 234, 0.9);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.1);
    }

    .slider-panel {
      display: grid;
      gap: 18px;
    }

    .slider-group {
      display: grid;
      gap: 8px;
    }

    .slider-group.hidden {
      display: none;
    }

    .range-wrap {
      position: relative;
      padding-top: 34px;
    }

    .value-badge {
      position: absolute;
      top: 0;
      transform: translateX(-50%);
      min-width: 44px;
      text-align: center;
      padding: 4px 9px;
      border-radius: 999px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.16);
      pointer-events: none;
      white-space: nowrap;
    }

    .value-badge.a-badge {
      background: var(--color-a);
    }

    .value-badge.d-badge {
      background: var(--color-d);
    }

    .value-badge.e-badge {
      background: var(--color-e);
    }

    input[type="range"] {
      width: 100%;
      margin: 0;
      background: transparent;
    }

    #a {
      accent-color: var(--color-a);
    }

    #d {
      accent-color: var(--color-d);
    }

    #e {
      accent-color: var(--color-e);
    }

    .number-line {
      display: grid;
      gap: 4px;
    }

    .number-line-track {
      position: relative;
      height: 18px;
    }

    .number-line-track::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 8px;
      height: 2px;
      background: #b9c7d8;
    }

    .number-line-ticks {
      display: flex;
      justify-content: space-between;
      position: absolute;
      inset: 0;
    }

    .number-line-ticks span {
      position: relative;
      width: 1px;
      display: flex;
      justify-content: center;
    }

    .number-line-ticks span::before {
      content: "";
      position: absolute;
      top: 4px;
      width: 2px;
      height: 10px;
      background: #7b8aa1;
    }

    .number-line-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #475569;
    }

    .number-line-labels span {
      min-width: 16px;
      text-align: center;
    }

    .number-line-labels span.neutral {
      font-weight: 800;
      color: #0f172a;
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .nav-buttons button {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 12px 10px;
      font-size: 16px;
      font-weight: 700;
      background: #e8f0ff;
      color: #1847a8;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
    }

    .nav-buttons button:hover {
      transform: translateY(-1px);
    }

    .nav-buttons button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    #btnNext.finish {
      background: #2563eb;
      color: white;
    }

    .ended .controls-overlay {
      opacity: 0.4;
      pointer-events: none;
    }

    @media (max-width: 820px) {
      .controls-overlay {
        position: static;
        width: auto;
        margin-top: 12px;
      }

      svg {
        height: 480px;
      }
    }

    @media (max-width: 700px) {
      svg {
        height: 430px;
      }

      .hero-title h1 {
        font-size: 23px;
      }

      .mode-title {
        font-size: 19px;
      }
    }

    @media (max-width: 480px) {
      svg {
        height: 380px;
      }

      .hero-title {
        padding: 12px 14px;
      }

      .hero-title h1 {
        font-size: 20px;
      }

      .mode-title {
        font-size: 17px;
      }

      .nav-buttons button {
        font-size: 14px;
        padding: 11px 8px;
      }

      .number-line-labels {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <div class="container" id="app">
    <div class="hero-title">
      <h1>Manipulation Normalparabel</h1>
    </div>

    <div class="mode-title" id="modeTitle"></div>

    <div class="graph-wrap">
      <svg id="svg"></svg>

      <div class="controls-overlay">
        <div class="slider-panel">
          <div class="slider-group" id="groupA">
            <div class="range-wrap">
              <div class="value-badge a-badge" id="aBadge"></div>
              <input type="range" id="a" min="0" max="100" step="1" />
            </div>

            <div class="number-line">
              <div class="number-line-track">
                <div class="number-line-ticks">
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span>
                </div>
              </div>
              <div class="number-line-labels">
                <span>-5</span>
                <span>-4</span>
                <span>-3</span>
                <span>-2</span>
                <span>-1</span>
                <span class="neutral">1</span>
                <span>0.1</span>
                <span>1</span>
                <span>2</span>
                <span>3</span>
                <span>5</span>
              </div>
            </div>
          </div>

          <div class="slider-group" id="groupD">
            <div class="range-wrap">
              <div class="value-badge d-badge" id="dBadge"></div>
              <input type="range" id="d" min="-5" max="5" step="1" />
            </div>

            <div class="number-line">
              <div class="number-line-track">
                <div class="number-line-ticks">
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span>
                </div>
              </div>
              <div class="number-line-labels">
                <span>-5</span>
                <span>-4</span>
                <span>-3</span>
                <span>-2</span>
                <span>-1</span>
                <span class="neutral">0</span>
                <span>1</span>
                <span>2</span>
                <span>3</span>
                <span>4</span>
                <span>5</span>
              </div>
            </div>
          </div>

          <div class="slider-group" id="groupE">
            <div class="range-wrap">
              <div class="value-badge e-badge" id="eBadge"></div>
              <input type="range" id="e" min="-5" max="5" step="1" />
            </div>

            <div class="number-line">
              <div class="number-line-track">
                <div class="number-line-ticks">
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span><span></span><span></span><span></span><span></span>
                  <span></span>
                </div>
              </div>
              <div class="number-line-labels">
                <span>-5</span>
                <span>-4</span>
                <span>-3</span>
                <span>-2</span>
                <span>-1</span>
                <span class="neutral">0</span>
                <span>1</span>
                <span>2</span>
                <span>3</span>
                <span>4</span>
                <span>5</span>
              </div>
            </div>
          </div>
        </div>

        <div class="nav-buttons">
          <button id="btnPrev" onclick="goPrev()">Zurück</button>
          <button id="btnNext" onclick="goNext()">Weiter</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const svg = document.getElementById("svg");
    const app = document.getElementById("app");
    const modeTitle = document.getElementById("modeTitle");

    const aSlider = document.getElementById("a");
    const dSlider = document.getElementById("d");
    const eSlider = document.getElementById("e");

    const aBadge = document.getElementById("aBadge");
    const dBadge = document.getElementById("dBadge");
    const eBadge = document.getElementById("eBadge");

    const groupA = document.getElementById("groupA");
    const groupD = document.getElementById("groupD");
    const groupE = document.getElementById("groupE");

    const btnPrev = document.getElementById("btnPrev");
    const btnNext = document.getElementById("btnNext");

    const modes = [
      { key: "vertical", title: "Verschiebung in y-Richtung" },
      { key: "horizontal", title: "Verschiebung in x-Richtung" },
      { key: "open", title: "Streckung / Stauchung" },
      { key: "all", title: "Alle Parameter" }
    ];

    const xMin = -10;
    const xMax = 10;
    const yMin = -10;
    const yMax = 10;

    let currentMode = "vertical";
    let ended = false;

    function roundToTenth(value) {
      return Math.round(value * 10) / 10;
    }

    function formatA(value) {
      return Number(value).toFixed(1).replace(/\.0$/, "");
    }

    function aRawToValue(raw) {
      if (raw <= 40) {
        return roundToTenth(-5 + raw * 0.1);
      }
      if (raw <= 49) {
        return roundToTenth(-1 + (raw - 40) * 0.1);
      }
      if (raw === 50) {
        return 1;
      }
      if (raw <= 58) {
        return roundToTenth(0.1 * (raw - 50));
      }
      return roundToTenth(1 + (raw - 59) * 0.1);
    }

    function valueToARaw(value) {
      const v = roundToTenth(value);

      if (v <= -1) {
        return Math.round((v + 5) / 0.1);
      }
      if (v < 0) {
        return Math.round(40 + (v + 1) / 0.1);
      }
      if (v === 1) {
        return 50;
      }
      if (v > 0 && v < 1) {
        return Math.round(50 + v / 0.1);
      }
      return Math.round(59 + (v - 1) / 0.1);
    }

    function getAValue() {
      return aRawToValue(parseInt(aSlider.value, 10));
    }

    function setAValue(value) {
      aSlider.value = valueToARaw(value);
    }

    function toCanvasPoint(x, y, w, h) {
      const scale = Math.min(w / (xMax - xMin), h / (yMax - yMin));
      const xOffset = (w - (xMax - xMin) * scale) / 2;
      const yOffset = (h - (yMax - yMin) * scale) / 2;

      return {
        x: xOffset + (x - xMin) * scale,
        y: h - yOffset - (y - yMin) * scale
      };
    }

    function formatSignedText(n) {
      return n >= 0 ? ` + ${n}` : ` - ${Math.abs(n)}`;
    }

    function updateBadgeFromPercent(badge, percent, value) {
      badge.textContent = value;
      badge.style.left = `${percent}%`;
    }

    function updateABadge() {
      const raw = parseInt(aSlider.value, 10);
      const percent = raw;
      updateBadgeFromPercent(aBadge, percent, formatA(getAValue()));
    }

    function updateBadge(slider, badge, value) {
      const min = Number(slider.min);
      const max = Number(slider.max);
      const percent = ((value - min) / (max - min)) * 100;
      updateBadgeFromPercent(badge, percent, value);
    }

    function buildFormulaParts(a, d, e) {
      if (currentMode === "vertical") {
        return [
          { text: "f(x) = x²", color: "#1847a8" },
          { text: formatSignedText(e), color: "var(--color-e)" }
        ];
      }

      if (currentMode === "horizontal") {
        if (d >= 0) {
          return [
            { text: "f(x) = (x - ", color: "#1847a8" },
            { text: `${d}`, color: "var(--color-d)" },
            { text: ")²", color: "#1847a8" }
          ];
        }
        return [
          { text: "f(x) = (x + ", color: "#1847a8" },
          { text: `${Math.abs(d)}`, color: "var(--color-d)" },
          { text: ")²", color: "#1847a8" }
        ];
      }

      if (currentMode === "open") {
        return [
          { text: "f(x) = ", color: "#1847a8" },
          { text: `${formatA(a)}`, color: "var(--color-a)" },
          { text: "x²", color: "#1847a8" }
        ];
      }

      const parts = [
        { text: "f(x) = ", color: "#1847a8" },
        { text: `${formatA(a)}`, color: "var(--color-a)" }
      ];

      if (d >= 0) {
        parts.push({ text: "(x - ", color: "#1847a8" });
        parts.push({ text: `${d}`, color: "var(--color-d)" });
        parts.push({ text: ")²", color: "#1847a8" });
      } else {
        parts.push({ text: "(x + ", color: "#1847a8" });
        parts.push({ text: `${Math.abs(d)}`, color: "var(--color-d)" });
        parts.push({ text: ")²", color: "#1847a8" });
      }

      parts.push({ text: e >= 0 ? " + " : " - ", color: "#1847a8" });
      parts.push({ text: `${Math.abs(e)}`, color: "var(--color-e)" });

      return parts;
    }

    function updateModeTitle() {
      const current = modes.find((m) => m.key === currentMode);
      modeTitle.textContent = ended ? "Ende" : current.title;
    }

    function updateNavButtons() {
      const index = modes.findIndex((m) => m.key === currentMode);
      btnPrev.disabled = ended || index === 0;

      if (ended) {
        btnNext.textContent = "Ende";
        btnNext.disabled = true;
        btnNext.classList.add("finish");
        return;
      }

      const isLast = index === modes.length - 1;
      btnNext.textContent = isLast ? "Ende" : "Weiter";
      btnNext.classList.toggle("finish", isLast);
      btnNext.disabled = false;
    }

    function setMode(mode) {
      if (ended) return;

      currentMode = mode;

      if (mode === "vertical") {
        groupA.classList.add("hidden");
        groupD.classList.add("hidden");
        groupE.classList.remove("hidden");
        setAValue(1);
        dSlider.value = 0;
      }

      if (mode === "horizontal") {
        groupA.classList.add("hidden");
        groupD.classList.remove("hidden");
        groupE.classList.add("hidden");
        setAValue(1);
        eSlider.value = 0;
      }

      if (mode === "open") {
        groupA.classList.remove("hidden");
        groupD.classList.add("hidden");
        groupE.classList.add("hidden");
        dSlider.value = 0;
        eSlider.value = 0;
      }

      if (mode === "all") {
        groupA.classList.remove("hidden");
        groupD.classList.remove("hidden");
        groupE.classList.remove("hidden");
      }

      updateModeTitle();
      updateNavButtons();
      draw();
    }

    function goPrev() {
      if (ended) return;
      const index = modes.findIndex((m) => m.key === currentMode);
      if (index > 0) {
        setMode(modes[index - 1].key);
      }
    }

    function endApp() {
      ended = true;
      app.classList.add("ended");
      updateModeTitle();
      updateNavButtons();
    }

    function goNext() {
      if (ended) return;

      const index = modes.findIndex((m) => m.key === currentMode);
      if (index === modes.length - 1) {
        endApp();
        return;
      }

      setMode(modes[index + 1].key);
    }

    function drawAxesAndGrid(w, h) {
      for (let x = Math.ceil(xMin); x <= xMax; x++) {
        const p1 = toCanvasPoint(x, yMin, w, h);
        const p2 = toCanvasPoint(x, yMax, w, h);
        svg.innerHTML += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="#dde4ec" stroke-width="1"/>`;
      }

      for (let y = Math.ceil(yMin); y <= yMax; y++) {
        const p1 = toCanvasPoint(xMin, y, w, h);
        const p2 = toCanvasPoint(xMax, y, w, h);
        svg.innerHTML += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="#dde4ec" stroke-width="1"/>`;
      }

      const xAxis1 = toCanvasPoint(xMin, 0, w, h);
      const xAxis2 = toCanvasPoint(xMax, 0, w, h);
      const yAxis1 = toCanvasPoint(0, yMin, w, h);
      const yAxis2 = toCanvasPoint(0, yMax, w, h);

      svg.innerHTML += `<line x1="${xAxis1.x}" y1="${xAxis1.y}" x2="${xAxis2.x}" y2="${xAxis2.y}" stroke="black" stroke-width="2"/>`;
      svg.innerHTML += `<line x1="${yAxis1.x}" y1="${yAxis1.y}" x2="${yAxis2.x}" y2="${yAxis2.y}" stroke="black" stroke-width="2"/>`;
    }

    function drawReferenceParabola(w, h) {
      let p1 = "";
      for (let i = 0; i <= 900; i++) {
        const x = xMin + (i * (xMax - xMin)) / 900;
        const y = x * x;
        const p = toCanvasPoint(x, y, w, h);
        p1 += `${p.x},${p.y} `;
      }

      svg.innerHTML += `<polyline points="${p1}" fill="none" stroke="black" stroke-width="4"/>`;

      const label = toCanvasPoint(-2.2, (-2.2) * (-2.2), w, h);
      svg.innerHTML += `<text x="${label.x}" y="${label.y - 10}" fill="black" font-size="18" font-weight="bold">x²</text>`;
    }

    function drawManipulatedParabola(a, d, e, w, h) {
      let p2 = "";
      for (let i = 0; i <= 1200; i++) {
        const x = xMin + (i * (xMax - xMin)) / 1200;
        const y = a * Math.pow(x - d, 2) + e;
        const p = toCanvasPoint(x, y, w, h);
        p2 += `${p.x},${p.y} `;
      }

      svg.innerHTML += `<polyline points="${p2}" fill="none" stroke="var(--color-curve)" stroke-width="4"/>`;
    }

    function drawFormulaInSvg(a, d, e, w, h) {
      const parts = buildFormulaParts(a, d, e);
      const baseX = 18;
      const baseY = h - 18;

      let tspans = "";
      for (const part of parts) {
        tspans += `<tspan fill="${part.color}">${part.text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")}</tspan>`;
      }

      svg.innerHTML += `<text x="${baseX}" y="${baseY}" font-size="28" font-weight="700" font-family="Arial, sans-serif">${tspans}</text>`;
    }

    function draw() {
      const a = getAValue();
      const d = parseInt(dSlider.value, 10);
      const e = parseInt(eSlider.value, 10);

      updateABadge();
      updateBadge(dSlider, dBadge, d);
      updateBadge(eSlider, eBadge, e);

      const w = svg.clientWidth;
      const h = svg.clientHeight;
      svg.innerHTML = "";

      drawAxesAndGrid(w, h);
      drawReferenceParabola(w, h);
      drawManipulatedParabola(a, d, e, w, h);
      drawFormulaInSvg(a, d, e, w, h);
    }

    setAValue(1);
    dSlider.value = 0;
    eSlider.value = 0;

    [aSlider, dSlider, eSlider].forEach((el) => {
      el.addEventListener("input", draw);
    });

    setMode("vertical");
    window.addEventListener("resize", draw);
  </script>
</body>
</html>
