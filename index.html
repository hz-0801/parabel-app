<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manipulation Normalparabel</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #f7fbff 0%, #ffffff 100%);
  color: #111;
}

.container {
  padding: 14px;
  max-width: 950px;
  margin: 0 auto;
}

.hero-title {
  margin-bottom: 14px;
  padding: 14px 16px;
  border-radius: 18px;
  background: linear-gradient(135deg, #0f4c81 0%, #2563eb 55%, #60a5fa 100%);
  color: white;
  box-shadow: 0 10px 24px rgba(37, 99, 235, 0.18);
}

.hero-title h1 {
  margin: 0;
  font-size: 28px;
  line-height: 1.1;
  letter-spacing: 0.2px;
}

.mode-buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}

.mode-buttons button {
  border: none;
  border-radius: 14px;
  padding: 12px 10px;
  font-size: 16px;
  font-weight: 700;
  background: #e8f0ff;
  color: #1847a8;
  cursor: pointer;
  transition: transform 0.12s ease, background 0.12s ease;
}

.mode-buttons button:hover {
  transform: translateY(-1px);
}

.mode-buttons button.active {
  background: #2563eb;
  color: white;
  box-shadow: 0 6px 16px rgba(37, 99, 235, 0.22);
}

.graph-wrap {
  margin-bottom: 14px;
}

svg {
  width: 100%;
  height: 420px;
  border: 1px solid #d8e1ea;
  background: #fafcff;
  display: block;
  border-radius: 16px;
}

.form-panel {
  padding: 12px 14px;
  border: 1px solid #d8e1ea;
  border-radius: 16px;
  background: white;
  box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
}

.form-title {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 10px;
}

.vertex-form {
  font-size: 24px;
  font-weight: bold;
  line-height: 1.6;
  margin-bottom: 14px;
  color: #1847a8;
}

.slider-panel {
  display: grid;
  gap: 12px;
}

.slider-group {
  display: grid;
  gap: 6px;
}

.slider-group.hidden {
  display: none;
}

.slider-group label {
  font-size: 16px;
  font-weight: 700;
  color: #1e293b;
}

input[type="range"] {
  width: 100%;
}

.value-negative {
  color: #c62828;
}

.value-positive {
  color: #1565c0;
}

.value-zero {
  color: #111;
}

.helper-text {
  margin-top: 10px;
  font-size: 14px;
  color: #475569;
}

@media (max-width: 820px) {
  .mode-buttons {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 700px) {
  svg {
    height: 380px;
  }

  .hero-title h1 {
    font-size: 23px;
  }

  .vertex-form {
    font-size: 20px;
  }
}

@media (max-width: 480px) {
  svg {
    height: 360px;
  }

  .hero-title {
    padding: 12px 14px;
  }

  .hero-title h1 {
    font-size: 20px;
  }

  .form-title {
    font-size: 14px;
  }

  .vertex-form {
    font-size: 17px;
  }

  .mode-buttons button {
    font-size: 14px;
    padding: 11px 8px;
  }
}
</style>
</head>

<body>
<div class="container">
  <div class="hero-title">
    <h1>Manipulation Normalparabel</h1>
  </div>

  <div class="mode-buttons">
    <button id="btnVertical" class="active" onclick="setMode('vertical')">Verschiebung in y-Richtung</button>
    <button id="btnHorizontal" onclick="setMode('horizontal')">Verschiebung in x-Richtung</button>
    <button id="btnOpen" onclick="setMode('open')">Streckung / Stauchung</button>
    <button id="btnAll" onclick="setMode('all')">Alle Parameter</button>
  </div>

  <div class="graph-wrap">
    <svg id="svg"></svg>
  </div>

  <div class="form-panel">
    <div class="form-title">Funktionsform</div>
    <div class="vertex-form" id="formulaDisplay"></div>

    <div class="slider-panel">
      <div class="slider-group" id="groupA">
        <label for="a">a = <span id="aValue"></span></label>
        <input type="range" id="a" min="-5" max="5" step="1">
      </div>

      <div class="slider-group" id="groupD">
        <label for="d">d = <span id="dValue"></span></label>
        <input type="range" id="d" min="-5" max="5" step="1">
      </div>

      <div class="slider-group" id="groupE">
        <label for="e">e = <span id="eValue"></span></label>
        <input type="range" id="e" min="-5" max="5" step="1">
      </div>
    </div>

    <div class="helper-text" id="helperText"></div>
  </div>
</div>

<script>
const svg = document.getElementById("svg");
const aSelect = document.getElementById("a");
const dSelect = document.getElementById("d");
const eSelect = document.getElementById("e");

const aValue = document.getElementById("aValue");
const dValue = document.getElementById("dValue");
const eValue = document.getElementById("eValue");
const formulaDisplay = document.getElementById("formulaDisplay");

const groupA = document.getElementById("groupA");
const groupD = document.getElementById("groupD");
const groupE = document.getElementById("groupE");

const helperText = document.getElementById("helperText");

const btnVertical = document.getElementById("btnVertical");
const btnHorizontal = document.getElementById("btnHorizontal");
const btnOpen = document.getElementById("btnOpen");
const btnAll = document.getElementById("btnAll");

const xMin = -10, xMax = 10, yMin = -10, yMax = 10;
let currentMode = "vertical";

function toX(x, w) {
  return (x - xMin) / (xMax - xMin) * w;
}

function toY(y, h) {
  return h - (y - yMin) / (yMax - yMin) * h;
}

function snum(n) {
  return Number(n).toString();
}

function formatSigned(n) {
  return n >= 0 ? `+ ${n}` : `- ${Math.abs(n)}`;
}

function formatInner(d) {
  return d >= 0 ? `(x - ${d})²` : `(x + ${Math.abs(d)})²`;
}

function updateValueColor(element, value) {
  element.classList.remove("value-negative", "value-positive", "value-zero");

  if (value < 0) {
    element.classList.add("value-negative");
  } else if (value > 0) {
    element.classList.add("value-positive");
  } else {
    element.classList.add("value-zero");
  }
}

function updateFormula(a, d, e) {
  if (currentMode === "vertical") {
    formulaDisplay.textContent = `f(x) = x² ${formatSigned(e)}`;
  }

  if (currentMode === "horizontal") {
    formulaDisplay.textContent = `f(x) = ${formatInner(d)}`;
  }

  if (currentMode === "open") {
    formulaDisplay.textContent = `f(x) = ${a}x²`;
  }

  if (currentMode === "all") {
    formulaDisplay.textContent = `f(x) = ${a}${formatInner(d)} ${formatSigned(e)}`;
  }
}

function setActiveButton(activeBtn) {
  [btnVertical, btnHorizontal, btnOpen, btnAll].forEach(btn => {
    btn.classList.remove("active");
  });
  activeBtn.classList.add("active");
}

function setMode(mode) {
  currentMode = mode;

  if (mode === "vertical") {
    groupA.classList.add("hidden");
    groupD.classList.add("hidden");
    groupE.classList.remove("hidden");
    aSelect.value = 1;
    dSelect.value = 0;
    helperText.textContent = "Verschiebung der Normalparabel nach oben oder unten: f(x) = x² + e";
    setActiveButton(btnVertical);
  }

  if (mode === "horizontal") {
    groupA.classList.add("hidden");
    groupD.classList.remove("hidden");
    groupE.classList.add("hidden");
    aSelect.value = 1;
    eSelect.value = 0;
    helperText.textContent = "Verschiebung der Normalparabel nach links oder rechts: f(x) = (x - d)²";
    setActiveButton(btnHorizontal);
  }

  if (mode === "open") {
    groupA.classList.remove("hidden");
    groupD.classList.add("hidden");
    groupE.classList.add("hidden");
    dSelect.value = 0;
    eSelect.value = 0;
    helperText.textContent = "Streckung oder Stauchung der Normalparabel: f(x) = ax²";
    setActiveButton(btnOpen);
  }

  if (mode === "all") {
    groupA.classList.remove("hidden");
    groupD.classList.remove("hidden");
    groupE.classList.remove("hidden");
    helperText.textContent = "Manipulation mit allen Parametern: f(x) = a(x - d)² + e";
    setActiveButton(btnAll);
  }

  draw();
}

function draw() {
  const a = parseInt(aSelect.value, 10);
  const d = parseInt(dSelect.value, 10);
  const e = parseInt(eSelect.value, 10);

  aValue.textContent = a;
  dValue.textContent = d;
  eValue.textContent = e;

  updateValueColor(aValue, a);
  updateValueColor(dValue, d);
  updateValueColor(eValue, e);
  updateFormula(a, d, e);

  const w = svg.clientWidth;
  const h = svg.clientHeight;

  svg.innerHTML = "";

  for (let x = Math.ceil(xMin); x <= xMax; x++) {
    const px = toX(x, w);
    svg.innerHTML += `<line x1="${px}" y1="0" x2="${px}" y2="${h}" stroke="#dde4ec" stroke-width="1"/>`;
  }

  for (let y = Math.ceil(yMin); y <= yMax; y++) {
    const py = toY(y, h);
    svg.innerHTML += `<line x1="0" y1="${py}" x2="${w}" y2="${py}" stroke="#dde4ec" stroke-width="1"/>`;
  }

  svg.innerHTML += `<line x1="0" y1="${toY(0, h)}" x2="${w}" y2="${toY(0, h)}" stroke="black" stroke-width="2"/>`;
  svg.innerHTML += `<line x1="${toX(0, w)}" y1="0" x2="${toX(0, w)}" y2="${h}" stroke="black" stroke-width="2"/>`;

  const nx = -2.2;
  const ny = nx * nx;
  svg.innerHTML += `<text x="${toX(nx, w)}" y="${toY(ny, h) - 10}" fill="black" font-size="18" font-weight="bold">x²</text>`;

  let p1 = "";
  for (let i = 0; i <= 900; i++) {
    const x = xMin + i * (xMax - xMin) / 900;
    const y = x * x;
    p1 += `${toX(x, w)},${toY(y, h)} `;
  }
  svg.innerHTML += `<polyline points="${p1}" fill="none" stroke="black" stroke-width="4"/>`;

  let p2 = "";
  for (let i = 0; i <= 900; i++) {
    const x = xMin + i * (xMax - xMin) / 900;
    const y = a * Math.pow(x - d, 2) + e;
    p2 += `${toX(x, w)},${toY(y, h)} `;
  }
  svg.innerHTML += `<polyline points="${p2}" fill="none" stroke="blue" stroke-width="4"/>`;

  const px = toX(d, w);
  const py = toY(e, h);
  svg.innerHTML += `<circle cx="${px}" cy="${py}" r="6" fill="red"/>`;

  const labelXValue = d + 1.2;
  const labelYValue = a * Math.pow(labelXValue - d, 2) + e;
  const labelText = `f(x) = ${snum(a)}(x - ${snum(d)})² + ${snum(e)}`;

  let textX = toX(labelXValue, w) + 8;
  let textY = toY(labelYValue, h) - 8;
  let anchor = "start";

  if (textX > w - 170) {
    textX = toX(labelXValue, w) - 8;
    anchor = "end";
  }

  if (textY < 20) {
    textY = toY(labelYValue, h) + 22;
  }

  svg.innerHTML += `<text x="${textX}" y="${textY}" text-anchor="${anchor}" fill="blue" font-size="18" font-weight="bold">${labelText}</text>`;
}

aSelect.value = 1;
dSelect.value = 0;
eSelect.value = 0;

[aSelect, dSelect, eSelect].forEach(el => {
  el.addEventListener("input", draw);
});

setMode("vertical");
</script>
</body>
</html>
