<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manipulation Normalparabel</title>

<style>
:root {
  --color-a: #7c3aed;
  --color-d: #ea580c;
  --color-e: #0891b2;
  --color-curve: #2563eb;
  --color-border: #d8e1ea;
  --color-text: #111;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #f7fbff 0%, #ffffff 100%);
  color: var(--color-text);
}

.container {
  padding: 14px;
  max-width: 950px;
  margin: 0 auto;
}

.hero-title {
  margin-bottom: 14px;
  padding: 14px 16px;
  border-radius: 18px;
  background: linear-gradient(135deg, #0f4c81 0%, #2563eb 55%, #60a5fa 100%);
  color: white;
}

.hero-title h1 {
  margin: 0;
  font-size: 28px;
  line-height: 1.1;
}

.mode-title {
  margin: 0 0 14px 0;
  padding: 12px 14px;
  border-radius: 14px;
  background: white;
  border: 1px solid var(--color-border);
  font-size: 22px;
  font-weight: 700;
  color: #1847a8;
}

.graph-wrap {
  margin-bottom: 14px;
}

svg {
  width: 100%;
  height: 430px;
  border: 1px solid var(--color-border);
  background: #fafcff;
  display: block;
  border-radius: 16px;
}

.form-panel {
  padding: 12px 14px;
  border: 1px solid var(--color-border);
  border-radius: 16px;
  background: white;
}

.slider-panel {
  display: grid;
  gap: 18px;
}

.slider-group {
  display: grid;
  gap: 6px;
}

.slider-group.hidden {
  display: none;
}

.range-wrap {
  position: relative;
  padding-top: 34px;
}

.value-badge {
  position: absolute;
  top: 0;
  transform: translateX(-50%);
  min-width: 36px;
  text-align: center;
  padding: 4px 9px;
  border-radius: 999px;
  color: white;
  font-size: 15px;
  font-weight: 700;
  box-shadow: 0 4px 10px rgba(15, 23, 42, 0.16);
  pointer-events: none;
  white-space: nowrap;
}

.value-badge.a-badge { background: var(--color-a); }
.value-badge.d-badge { background: var(--color-d); }
.value-badge.e-badge { background: var(--color-e); }

input[type="range"] {
  width: 100%;
  margin: 0;
}

#a { accent-color: var(--color-a); }
#d { accent-color: var(--color-d); }
#e { accent-color: var(--color-e); }

.nav-buttons {
  display: flex;
  gap: 10px;
  margin-top: 18px;
}

.nav-buttons button {
  flex: 1;
  border: none;
  border-radius: 14px;
  padding: 12px 10px;
  font-size: 16px;
  font-weight: 700;
  background: #e8f0ff;
  color: #1847a8;
  cursor: pointer;
  transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
}

.nav-buttons button:hover {
  transform: translateY(-1px);
}

.nav-buttons button:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  transform: none;
}

#btnNext.finish {
  background: #2563eb;
  color: white;
}

.ended .slider-panel,
.ended .nav-buttons {
  opacity: 0.4;
  pointer-events: none;
}

@media (max-width: 700px) {
  svg {
    height: 390px;
  }

  .hero-title h1 {
    font-size: 23px;
  }

  .mode-title {
    font-size: 19px;
  }
}

@media (max-width: 480px) {
  svg {
    height: 360px;
  }

  .hero-title {
    padding: 12px 14px;
  }

  .hero-title h1 {
    font-size: 20px;
  }

  .mode-title {
    font-size: 17px;
  }

  .nav-buttons button {
    font-size: 14px;
    padding: 11px 8px;
  }
}
</style>
</head>

<body>
<div class="container" id="app">
  <div class="hero-title">
    <h1>Manipulation Normalparabel</h1>
  </div>

  <div class="mode-title" id="modeTitle"></div>

  <div class="graph-wrap">
    <svg id="svg"></svg>
  </div>

  <div class="form-panel">
    <div class="slider-panel">
      <div class="slider-group" id="groupA">
        <div class="range-wrap">
          <div class="value-badge a-badge" id="aBadge"></div>
          <input type="range" id="a" min="-5" max="5" step="1">
        </div>
      </div>

      <div class="slider-group" id="groupD">
        <div class="range-wrap">
          <div class="value-badge d-badge" id="dBadge"></div>
          <input type="range" id="d" min="-5" max="5" step="1">
        </div>
      </div>

      <div class="slider-group" id="groupE">
        <div class="range-wrap">
          <div class="value-badge e-badge" id="eBadge"></div>
          <input type="range" id="e" min="-5" max="5" step="1">
        </div>
      </div>
    </div>

    <div class="nav-buttons">
      <button id="btnPrev" onclick="goPrev()">Zurück</button>
      <button id="btnNext" onclick="goNext()">Weiter</button>
    </div>
  </div>
</div>

<script>
const svg = document.getElementById("svg");
const app = document.getElementById("app");
const modeTitle = document.getElementById("modeTitle");

const aSlider = document.getElementById("a");
const dSlider = document.getElementById("d");
const eSlider = document.getElementById("e");

const aBadge = document.getElementById("aBadge");
const dBadge = document.getElementById("dBadge");
const eBadge = document.getElementById("eBadge");

const groupA = document.getElementById("groupA");
const groupD = document.getElementById("groupD");
const groupE = document.getElementById("groupE");

const btnPrev = document.getElementById("btnPrev");
const btnNext = document.getElementById("btnNext");

const modes = [
  { key: "vertical", title: "Verschiebung in y-Richtung" },
  { key: "horizontal", title: "Verschiebung in x-Richtung" },
  { key: "open", title: "Streckung / Stauchung" },
  { key: "all", title: "Alle Parameter" }
];

const xMin = -10;
const xMax = 10;
const yMin = -8;
const yMax = 10;

let currentMode = "vertical";
let ended = false;

function toX(x, w) {
  return (x - xMin) / (xMax - xMin) * w;
}

function toY(y, h) {
  return h - (y - yMin) / (yMax - yMin) * h;
}

function formatSignedText(n) {
  return n >= 0 ? ` + ${n}` : ` - ${Math.abs(n)}`;
}

function formatInnerText(d) {
  return d >= 0 ? `(x - ${d})²` : `(x + ${Math.abs(d)})²`;
}

function formatAValue(a) {
  return `${a}`;
}

function clampANonZero(value) {
  return value === 0 ? 1 : value;
}

function updateBadge(slider, badge, value) {
  const min = Number(slider.min);
  const max = Number(slider.max);
  const percent = ((value - min) / (max - min)) * 100;
  badge.textContent = value;
  badge.style.left = `calc(${percent}% + (${10 - percent * 0.2}px))`;
}

function updateABadge(value) {
  const min = Number(aSlider.min);
  const max = Number(aSlider.max);
  const centeredMin = 1;
  const centeredMax = 5;

  let percent;
  if (value >= 1) {
    percent = 50 + ((value - centeredMin) / (centeredMax - centeredMin)) * 50;
  } else {
    percent = ((value - min) / (1 - min)) * 50;
  }

  aBadge.textContent = value;
  aBadge.style.left = `${percent}%`;
}

function buildFormulaParts(a, d, e) {
  if (currentMode === "vertical") {
    return [
      { text: "f(x) = x²", color: "#1847a8" },
      { text: formatSignedText(e), color: "var(--color-e)" }
    ];
  }

  if (currentMode === "horizontal") {
    if (d >= 0) {
      return [
        { text: "f(x) = (x - ", color: "#1847a8" },
        { text: `${d}`, color: "var(--color-d)" },
        { text: ")²", color: "#1847a8" }
      ];
    } else {
      return [
        { text: "f(x) = (x + ", color: "#1847a8" },
        { text: `${Math.abs(d)}`, color: "var(--color-d)" },
        { text: ")²", color: "#1847a8" }
      ];
    }
  }

  if (currentMode === "open") {
    return [
      { text: "f(x) = ", color: "#1847a8" },
      { text: `${a}`, color: "var(--color-a)" },
      { text: "x²", color: "#1847a8" }
    ];
  }

  const parts = [
    { text: "f(x) = ", color: "#1847a8" },
    { text: `${a}`, color: "var(--color-a)" }
  ];

  if (d >= 0) {
    parts.push({ text: "(x - ", color: "#1847a8" });
    parts.push({ text: `${d}`, color: "var(--color-d)" });
    parts.push({ text: ")²", color: "#1847a8" });
  } else {
    parts.push({ text: "(x + ", color: "#1847a8" });
    parts.push({ text: `${Math.abs(d)}`, color: "var(--color-d)" });
    parts.push({ text: ")²", color: "#1847a8" });
  }

  parts.push({ text: e >= 0 ? " + " : " - ", color: "#1847a8" });
  parts.push({ text: `${Math.abs(e)}`, color: "var(--color-e)" });

  return parts;
}

function updateModeTitle() {
  const current = modes.find(m => m.key === currentMode);
  modeTitle.textContent = ended ? "Ende" : current.title;
}

function updateNavButtons() {
  const index = modes.findIndex(m => m.key === currentMode);
  btnPrev.disabled = ended || index === 0;

  if (ended) {
    btnNext.textContent = "Ende";
    btnNext.disabled = true;
    btnNext.classList.add("finish");
    return;
  }

  const isLast = index === modes.length - 1;
  btnNext.textContent = isLast ? "Ende" : "Weiter";
  btnNext.classList.toggle("finish", isLast);
  btnNext.disabled = false;
}

function syncAFromInput() {
  let value = parseInt(aSlider.value, 10);
  value = clampANonZero(value);
  aSlider.value = value;
  return value;
}

function setMode(mode) {
  if (ended) return;

  currentMode = mode;

  if (mode === "vertical") {
    groupA.classList.add("hidden");
    groupD.classList.add("hidden");
    groupE.classList.remove("hidden");
    aSlider.value = 1;
    dSlider.value = 0;
  }

  if (mode === "horizontal") {
    groupA.classList.add("hidden");
    groupD.classList.remove("hidden");
    groupE.classList.add("hidden");
    aSlider.value = 1;
    eSlider.value = 0;
  }

  if (mode === "open") {
    groupA.classList.remove("hidden");
    groupD.classList.add("hidden");
    groupE.classList.add("hidden");
    dSlider.value = 0;
    eSlider.value = 0;
    syncAFromInput();
  }

  if (mode === "all") {
    groupA.classList.remove("hidden");
    groupD.classList.remove("hidden");
    groupE.classList.remove("hidden");
    syncAFromInput();
  }

  updateModeTitle();
  updateNavButtons();
  draw();
}

function goPrev() {
  if (ended) return;
  const index = modes.findIndex(m => m.key === currentMode);
  if (index > 0) setMode(modes[index - 1].key);
}

function endApp() {
  ended = true;
  app.classList.add("ended");
  updateModeTitle();
  updateNavButtons();
}

function goNext() {
  if (ended) return;

  const index = modes.findIndex(m => m.key === currentMode);
  if (index === modes.length - 1) {
    endApp();
    return;
  }

  setMode(modes[index + 1].key);
}

function drawAxesAndGrid(w, h) {
  for (let x = Math.ceil(xMin); x <= xMax; x++) {
    const px = toX(x, w);
    svg.innerHTML += `<line x1="${px}" y1="0" x2="${px}" y2="${h}" stroke="#dde4ec" stroke-width="1"/>`;
  }

  for (let y = Math.ceil(yMin); y <= yMax; y++) {
    const py = toY(y, h);
    svg.innerHTML += `<line x1="0" y1="${py}" x2="${w}" y2="${py}" stroke="#dde4ec" stroke-width="1"/>`;
  }

  svg.innerHTML += `<line x1="0" y1="${toY(0, h)}" x2="${w}" y2="${toY(0, h)}" stroke="black" stroke-width="2"/>`;
  svg.innerHTML += `<line x1="${toX(0, w)}" y1="0" x2="${toX(0, w)}" y2="${h}" stroke="black" stroke-width="2"/>`;
}

function drawReferenceParabola(w, h) {
  let p1 = "";
  for (let i = 0; i <= 900; i++) {
    const x = xMin + i * (xMax - xMin) / 900;
    const y = x * x;
    p1 += `${toX(x, w)},${toY(y, h)} `;
  }
  svg.innerHTML += `<polyline points="${p1}" fill="none" stroke="black" stroke-width="4"/>`;

  const nx = -2.2;
  const ny = nx * nx;
  svg.innerHTML += `<text x="${toX(nx, w)}" y="${toY(ny, h) - 10}" fill="black" font-size="18" font-weight="bold">x²</text>`;
}

function drawManipulatedParabola(a, d, e, w, h) {
  let p2 = "";
  for (let i = 0; i <= 900; i++) {
    const x = xMin + i * (xMax - xMin) / 900;
    const y = a * Math.pow(x - d, 2) + e;
    p2 += `${toX(x, w)},${toY(y, h)} `;
  }
  svg.innerHTML += `<polyline points="${p2}" fill="none" stroke="var(--color-curve)" stroke-width="4"/>`;
}

function drawFormulaInSvg(a, d, e, w, h) {
  const parts = buildFormulaParts(a, d, e);
  const baseX = 18;
  const baseY = h - 18;

  let tspans = "";
  for (const part of parts) {
    tspans += `<tspan fill="${part.color}">${part.text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</tspan>`;
  }

  svg.innerHTML += `
    <text x="${baseX}" y="${baseY}" font-size="28" font-weight="700" font-family="Arial, sans-serif">
      ${tspans}
    </text>
  `;
}

function draw() {
  let a = parseInt(aSlider.value, 10);
  const d = parseInt(dSlider.value, 10);
  const e = parseInt(eSlider.value, 10);

  a = clampANonZero(a);
  aSlider.value = a;

  updateABadge(a);
  updateBadge(dSlider, dBadge, d);
  updateBadge(eSlider, eBadge, e);

  const w = svg.clientWidth;
  const h = svg.clientHeight;
  svg.innerHTML = "";

  drawAxesAndGrid(w, h);
  drawReferenceParabola(w, h);
  drawManipulatedParabola(a, d, e, w, h);
  drawFormulaInSvg(a, d, e, w, h);
}

aSlider.value = 1;
dSlider.value = 0;
eSlider.value = 0;

aSlider.addEventListener("input", () => {
  syncAFromInput();
  draw();
});

[dSlider, eSlider].forEach(el => {
  el.addEventListener("input", draw);
});

setMode("vertical");
window.addEventListener("resize", draw);
</script>
</body>
</html>
