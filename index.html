<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parabel Vergleich</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: white;
}

.container {
  padding: 10px;
}

.buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}

button {
  padding: 8px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  font-weight: bold;
}

.sliders {
  margin-bottom: 10px;
}

svg {
  width: 100%;
  height: 320px;
  border: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="container">

<div class="buttons">
<button onclick="setValues(1,0,0)">Normal</button>
<button onclick="setValues(0.5,0,0)">Breit</button>
<button onclick="setValues(2,0,0)">Schmal</button>
<button onclick="setValues(1,-3,2)">Verschoben</button>
</div>

<div class="sliders">
a: <input id="a" type="range" min="-3" max="3" step="0.1" value="1"><br>
d: <input id="d" type="range" min="-8" max="8" step="0.1" value="0"><br>
e: <input id="e" type="range" min="-8" max="8" step="0.1" value="0">
</div>

<svg id="svg"></svg>

</div>

<script>
const svg = document.getElementById("svg");

const xMin = -10, xMax = 10, yMin = -10, yMax = 10;

function toX(x,w){return (x-xMin)/(xMax-xMin)*w;}
function toY(y,h){return h-(y-yMin)/(yMax-yMin)*h;}

function draw(){
  const a = parseFloat(document.getElementById("a").value);
  const d = parseFloat(document.getElementById("d").value);
  const e = parseFloat(document.getElementById("e").value);

  const w = svg.clientWidth;
  const h = svg.clientHeight;

  svg.innerHTML = "";

  // Achsen
  svg.innerHTML += `<line x1="0" y1="${toY(0,h)}" x2="${w}" y2="${toY(0,h)}" stroke="black"/>`;
  svg.innerHTML += `<line x1="${toX(0,w)}" y1="0" x2="${toX(0,w)}" y2="${h}" stroke="black"/>`;

  // Normalparabel
  let p1="";
  for(let i=0;i<500;i++){
    let x=xMin+i*(xMax-xMin)/500;
    let y=x*x;
    p1 += `${toX(x,w)},${toY(y,h)} `;
  }
  svg.innerHTML += `<polyline points="${p1}" fill="none" stroke="black"/>`;

  // Vergleichsparabel
  let p2="";
  for(let i=0;i<500;i++){
    let x=xMin+i*(xMax-xMin)/500;
    let y=a*Math.pow(x-d,2)+e;
    p2 += `${toX(x,w)},${toY(y,h)} `;
  }
  svg.innerHTML += `<polyline points="${p2}" fill="none" stroke="blue"/>`;

  // Scheitelpunkt
  svg.innerHTML += `<circle cx="${toX(d,w)}" cy="${toY(e,h)}" r="4" fill="red"/>`;
}

function setValues(A,D,E){
  document.getElementById("a").value=A;
  document.getElementById("d").value=D;
  document.getElementById("e").value=E;
  draw();
}

document.querySelectorAll("input").forEach(i=>i.oninput=draw);

draw();
</script>


</body>
</html>
