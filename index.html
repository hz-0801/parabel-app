<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verschiebung und Streckung der Normalparabel</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: white;
}

.container {
  padding: 10px;
  max-width: 900px;
  margin: 0 auto;
}

.title {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 10px;
}

.graph-wrap {
  margin-bottom: 14px;
}

svg {
  width: 100%;
  height: 420px;
  border: 1px solid #ddd;
  background: #fafafa;
  display: block;
}

.form-panel {
  padding: 12px 14px;
  border: 1px solid #ddd;
  border-radius: 14px;
  background: #f8f8f8;
}

.form-title {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 10px;
}

.vertex-form {
  font-size: 24px;
  font-weight: bold;
  line-height: 1.6;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
}

select {
  font-size: 18px;
  padding: 4px 8px;
  border-radius: 10px;
  border: 1px solid #bbb;
  background: white;
  font-weight: bold;
  min-width: 64px;
}

.value-negative {
  color: #c62828;
  background: #fff1f1;
  border-color: #e3aaaa;
}

.value-positive {
  color: #1565c0;
  background: #eef5ff;
  border-color: #aac7ef;
}

.value-zero {
  color: #111;
  background: white;
  border-color: #bbb;
}

@media (max-width: 700px) {
  svg {
    height: 380px;
  }

  .title {
    font-size: 20px;
  }

  .vertex-form {
    font-size: 20px;
  }

  select {
    font-size: 16px;
    min-width: 56px;
  }
}

@media (max-width: 480px) {
  svg {
    height: 360px;
  }

  .title {
    font-size: 18px;
  }

  .form-title {
    font-size: 14px;
  }

  .vertex-form {
    font-size: 17px;
  }

  select {
    font-size: 15px;
    min-width: 52px;
    padding: 4px 6px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="title">Verschiebung und Streckung der Normalparabel</div>

  <div class="graph-wrap">
    <svg id="svg"></svg>
  </div>

  <div class="form-panel">
    <div class="form-title">Scheitelpunktform</div>

    <div class="vertex-form">
      <span>f(x) =</span>
      <select id="a"></select>
      <span>(x -</span>
      <select id="d"></select>
      <span>)² +</span>
      <select id="e"></select>
    </div>
  </div>
</div>

<script>
const svg = document.getElementById("svg");
const aSelect = document.getElementById("a");
const dSelect = document.getElementById("d");
const eSelect = document.getElementById("e");

const xMin = -10, xMax = 10, yMin = -10, yMax = 10;

function toX(x, w) {
  return (x - xMin) / (xMax - xMin) * w;
}

function toY(y, h) {
  return h - (y - yMin) / (yMax - yMin) * h;
}

function snum(n) {
  return Number(n).toString();
}

function populateSelect(select, start, end, skipZero = false) {
  select.innerHTML = "";
  for (let i = start; i <= end; i++) {
    if (skipZero && i === 0) continue;
    const option = document.createElement("option");
    option.value = i;
    option.textContent = i;
    select.appendChild(option);
  }
}

function updateSelectColor(select) {
  const value = parseInt(select.value, 10);
  select.classList.remove("value-negative", "value-positive", "value-zero");

  if (value < 0) {
    select.classList.add("value-negative");
  } else if (value > 0) {
    select.classList.add("value-positive");
  } else {
    select.classList.add("value-zero");
  }
}

function draw() {
  const a = parseInt(aSelect.value, 10);
  const d = parseInt(dSelect.value, 10);
  const e = parseInt(eSelect.value, 10);

  updateSelectColor(aSelect);
  updateSelectColor(dSelect);
  updateSelectColor(eSelect);

  const w = svg.clientWidth;
  const h = svg.clientHeight;

  svg.innerHTML = "";

  // Raster
  for (let x = Math.ceil(xMin); x <= xMax; x++) {
    const px = toX(x, w);
    svg.innerHTML += `<line x1="${px}" y1="0" x2="${px}" y2="${h}" stroke="#ddd" stroke-width="1"/>`;
  }

  for (let y = Math.ceil(yMin); y <= yMax; y++) {
    const py = toY(y, h);
    svg.innerHTML += `<line x1="0" y1="${py}" x2="${w}" y2="${py}" stroke="#ddd" stroke-width="1"/>`;
  }

  // Achsen
  svg.innerHTML += `<line x1="0" y1="${toY(0, h)}" x2="${w}" y2="${toY(0, h)}" stroke="black" stroke-width="2"/>`;
  svg.innerHTML += `<line x1="${toX(0, w)}" y1="0" x2="${toX(0, w)}" y2="${h}" stroke="black" stroke-width="2"/>`;

  // Beschriftung Normalparabel
  const nx = -2.2;
  const ny = nx * nx;
  svg.innerHTML += `<text x="${toX(nx, w)}" y="${toY(ny, h) - 10}" fill="black" font-size="18" font-weight="bold">x²</text>`;

  // Normalparabel
  let p1 = "";
  for (let i = 0; i <= 900; i++) {
    const x = xMin + i * (xMax - xMin) / 900;
    const y = x * x;
    p1 += `${toX(x, w)},${toY(y, h)} `;
  }
  svg.innerHTML += `<polyline points="${p1}" fill="none" stroke="black" stroke-width="4"/>`;

  // Vergleichsparabel
  let p2 = "";
  for (let i = 0; i <= 900; i++) {
    const x = xMin + i * (xMax - xMin) / 900;
    const y = a * Math.pow(x - d, 2) + e;
    p2 += `${toX(x, w)},${toY(y, h)} `;
  }
  svg.innerHTML += `<polyline points="${p2}" fill="none" stroke="blue" stroke-width="4"/>`;

  // Scheitelpunkt nur als roter Punkt
  const px = toX(d, w);
  const py = toY(e, h);
  svg.innerHTML += `<circle cx="${px}" cy="${py}" r="6" fill="red"/>`;

  // Funktionsgleichung an die blaue Parabel schreiben
  const labelXValue = d + 1.2;
  const labelYValue = a * Math.pow(labelXValue - d, 2) + e;
  const labelText = `f(x) = ${snum(a)}(x - ${snum(d)})² + ${snum(e)}`;

  let textX = toX(labelXValue, w) + 8;
  let textY = toY(labelYValue, h) - 8;
  let anchor = "start";

  if (textX > w - 170) {
    textX = toX(labelXValue, w) - 8;
    anchor = "end";
  }

  if (textY < 20) {
    textY = toY(labelYValue, h) + 22;
  }

  svg.innerHTML += `<text x="${textX}" y="${textY}" text-anchor="${anchor}" fill="blue" font-size="18" font-weight="bold">${labelText}</text>`;
}

populateSelect(aSelect, -5, 5, true);
populateSelect(dSelect, -5, 5, false);
populateSelect(eSelect, -5, 5, false);

aSelect.value = 1;
dSelect.value = 0;
eSelect.value = 0;

[aSelect, dSelect, eSelect].forEach(el => {
  el.addEventListener("change", draw);
});

draw();
</script>

</body>
</html>
