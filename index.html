<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parabel Vergleich</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: white;
}

.container {
  padding: 10px;
}

.formula {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 14px;
}

.graph-wrap {
  margin-bottom: 18px;
}

.buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 12px;
  background: #2563eb;
  color: white;
  font-weight: bold;
  font-size: 18px;
}

.sliders {
  margin-top: 8px;
}

.slider-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 18px;
  font-size: 22px;
}

.slider-row label {
  width: 28px;
  font-weight: bold;
}

.slider-row input[type="range"] {
  flex: 1;
  height: 40px;
}

.slider-value {
  width: 52px;
  text-align: right;
  font-size: 18px;
  color: #333;
}

svg {
  width: 100%;
  height: 360px;
  border: 1px solid #ddd;
  background: #fafafa;
}
</style>
</head>

<body>

<div class="container">

<div class="formula" id="formula">g(x) = 1(x - 0)² + 0</div>

<div class="graph-wrap">
  <svg id="svg"></svg>
</div>

<div class="buttons">
  <button onclick="setValues(1,0,0)">Normal</button>
  <button onclick="setValues(0.5,0,0)">Breit</button>
  <button onclick="setValues(2,0,0)">Schmal</button>
  <button onclick="setValues(1,-3,2)">Verschoben</button>
</div>

<div class="sliders">
  <div class="slider-row">
    <label for="a">a:</label>
    <input id="a" type="range" min="-3" max="3" step="0.1" value="1">
    <div class="slider-value" id="aVal">1.0</div>
  </div>

  <div class="slider-row">
    <label for="d">d:</label>
    <input id="d" type="range" min="-8" max="8" step="0.1" value="0">
    <div class="slider-value" id="dVal">0.0</div>
  </div>

  <div class="slider-row">
    <label for="e">e:</label>
    <input id="e" type="range" min="-8" max="8" step="0.1" value="0">
    <div class="slider-value" id="eVal">0.0</div>
  </div>
</div>

</div>

<script>
const svg = document.getElementById("svg");
const formula = document.getElementById("formula");
const aVal = document.getElementById("aVal");
const dVal = document.getElementById("dVal");
const eVal = document.getElementById("eVal");

const xMin = -10, xMax = 10, yMin = -10, yMax = 10;

function toX(x, w) {
  return (x - xMin) / (xMax - xMin) * w;
}

function toY(y, h) {
  return h - (y - yMin) / (yMax - yMin) * h;
}

function fnum(n) {
  return (Math.round(n * 10) / 10).toFixed(1);
}

function snum(n) {
  return (Math.round(n * 10) / 10).toString();
}

function draw() {
  const a = parseFloat(document.getElementById("a").value);
  const d = parseFloat(document.getElementById("d").value);
  const e = parseFloat(document.getElementById("e").value);

  aVal.textContent = fnum(a);
  dVal.textContent = fnum(d);
  eVal.textContent = fnum(e);
  formula.textContent = `g(x) = ${snum(a)}(x - ${snum(d)})² + ${snum(e)}`;

  const w = svg.clientWidth;
  const h = svg.clientHeight;

  svg.innerHTML = "";

  // Raster
  for (let x = Math.ceil(xMin); x <= xMax; x++) {
    const px = toX(x, w);
    svg.innerHTML += `<line x1="${px}" y1="0" x2="${px}" y2="${h}" stroke="#ddd" stroke-width="1"/>`;
  }

  for (let y = Math.ceil(yMin); y <= yMax; y++) {
    const py = toY(y, h);
    svg.innerHTML += `<line x1="0" y1="${py}" x2="${w}" y2="${py}" stroke="#ddd" stroke-width="1"/>`;
  }

  // Achsen
  svg.innerHTML += `<line x1="0" y1="${toY(0,h)}" x2="${w}" y2="${toY(0,h)}" stroke="black" stroke-width="2"/>`;
  svg.innerHTML += `<line x1="${toX(0,w)}" y1="0" x2="${toX(0,w)}" y2="${h}" stroke="black" stroke-width="2"/>`;

  // Normalparabel
  let p1 = "";
  for (let i = 0; i < 700; i++) {
    let x = xMin + i * (xMax - xMin) / 700;
    let y = x * x;
    p1 += `${toX(x,w)},${toY(y,h)} `;
  }
  svg.innerHTML += `<polyline points="${p1}" fill="none" stroke="black" stroke-width="4"/>`;

  // Vergleichsparabel
  let p2 = "";
  for (let i = 0; i < 700; i++) {
    let x = xMin + i * (xMax - xMin) / 700;
    let y = a * Math.pow(x - d, 2) + e;
    p2 += `${toX(x,w)},${toY(y,h)} `;
  }
  svg.innerHTML += `<polyline points="${p2}" fill="none" stroke="blue" stroke-width="4"/>`;

  // Scheitelpunkt + Beschriftung
  const px = toX(d, w);
  const py = toY(e, h);
  const label = `S(${snum(d)} | ${snum(e)})`;

  svg.innerHTML += `<circle cx="${px}" cy="${py}" r="6" fill="red"/>`;
  svg.innerHTML += `<line x1="${px}" y1="${py}" x2="${px+18}" y2="${py-18}" stroke="red" stroke-width="2"/>`;
  svg.innerHTML += `<text x="${px+22}" y="${py-22}" fill="red" font-size="18" font-weight="bold">${label}</text>`;
}

function setValues(A, D, E) {
  document.getElementById("a").value = A;
  document.getElementById("d").value = D;
  document.getElementById("e").value = E;
  draw();
}

document.querySelectorAll("input").forEach(i => i.oninput = draw);

draw();
</script>

</body>
</html>
