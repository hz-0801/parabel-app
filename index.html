<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manipulation Normalparabel</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f7fbff 0%, #ffffff 100%);
    }

    .container {
      padding: 14px;
      max-width: 950px;
      margin: 0 auto;
    }

    .hero-title {
      margin-bottom: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, #0f4c81, #2563eb);
      color: white;
    }

    .hero-title h1 {
      margin: 0;
      font-size: 28px;
    }

    svg {
      width: 100%;
      height: 500px;
      border: 1px solid #d8e1ea;
      background: #fafcff;
      border-radius: 16px;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="hero-title">
    <h1>Manipulation Normalparabel</h1>
  </div>

  <svg id="svg"></svg>
</div>

<script>
  const svg = document.getElementById("svg");

  const xMin = -10, xMax = 10;
  const yMin = -10, yMax = 10;

  function toCanvasPoint(x, y, w, h) {
    const scale = Math.min(w / (xMax - xMin), h / (yMax - yMin));

    const xOffset = (w - (xMax - xMin) * scale) / 2;
    const yOffset = (h - (yMax - yMin) * scale) / 2;

    return {
      x: xOffset + (x - xMin) * scale,
      y: h - yOffset - (y - yMin) * scale
    };
  }

  function draw() {
    const w = svg.clientWidth;
    const h = svg.clientHeight;

    svg.innerHTML = "";

    // Gitter
    for (let x = xMin; x <= xMax; x++) {
      const p1 = toCanvasPoint(x, yMin, w, h);
      const p2 = toCanvasPoint(x, yMax, w, h);
      svg.innerHTML += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="#dde4ec"/>`;
    }

    for (let y = yMin; y <= yMax; y++) {
      const p1 = toCanvasPoint(xMin, y, w, h);
      const p2 = toCanvasPoint(xMax, y, w, h);
      svg.innerHTML += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="#dde4ec"/>`;
    }

    // Achsen
    const xAxis1 = toCanvasPoint(xMin, 0, w, h);
    const xAxis2 = toCanvasPoint(xMax, 0, w, h);

    const yAxis1 = toCanvasPoint(0, yMin, w, h);
    const yAxis2 = toCanvasPoint(0, yMax, w, h);

    svg.innerHTML += `<line x1="${xAxis1.x}" y1="${xAxis1.y}" x2="${xAxis2.x}" y2="${xAxis2.y}" stroke="black" stroke-width="2"/>`;
    svg.innerHTML += `<line x1="${yAxis1.x}" y1="${yAxis1.y}" x2="${yAxis2.x}" y2="${yAxis2.y}" stroke="black" stroke-width="2"/>`;

    // Parabel
    let points = "";
    for (let i = 0; i <= 500; i++) {
      const x = xMin + (i / 500) * (xMax - xMin);
      const y = x * x;
      const p = toCanvasPoint(x, y, w, h);
      points += `${p.x},${p.y} `;
    }

    svg.innerHTML += `<polyline points="${points}" fill="none" stroke="blue" stroke-width="3"/>`;
  }

  window.addEventListener("resize", draw);
  draw();
</script>

</body>
</html>
